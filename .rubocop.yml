plugins: rubocop-rails
Naming/AccessorMethodName:
  Exclude:
    # "set_" is the Sets domain noun (set_chip_count etc.), not a writer prefix
    - 'app/helpers/sets_helper.rb'
Lint/MissingSuper:
  Exclude:
    - 'app/services/**/*'
    # BL Code
    - 'app/components/blacklight/**/*'
Metrics/ClassLength:
  Max: 120
Metrics/AbcSize:
  Max: 22
  Exclude:
    - 'app/decorators/*'
    - 'app/lib/mods_decoration.rb'
    - 'app/services/**/*'
    # Constrained by gem expectations
    - 'app/models/breadcrumb_trail.rb'
    # Nature of object conversion, lots of assignment
    - 'app/lib/mods_to_json.rb'
Metrics/CyclomaticComplexity:
  Exclude:
    - 'app/decorators/*'
Metrics/PerceivedComplexity:
  Exclude:
    - 'app/decorators/*'
Style/OpenStructUse:
  Enabled: false
Lint/AmbiguousBlockAssociation:
  Enabled: false
Rails/FindEach:
  Enabled: false
Rails/I18nLocaleTexts:
  Enabled: false
Style/Documentation:
  Enabled: false
Style/SymbolArray:
  Enabled: false
Style/HashAsLastArrayItem:
  Enabled: false
Layout/LineLength:
  Max: 120
  Include:
    - 'app/**/*'
Metrics/MethodLength:
  Max: 15
  AllowedMethods: ['role_permissions', 'convert_xml_to_json']
AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2
  Exclude:
    - 'node_modules/**/*'
    - 'vendor/**/*'
    - 'db/**/*'
    - 'bin/**/*'
    - 'config/**/*'
    - 'app/lib/mods_builder.rb'
Metrics/BlockLength:
  Exclude:
    # BL config too long
    - 'app/controllers/catalog_controller.rb'
    - 'spec/**/*'
    - 'lib/tasks/*'
Rails/StrongParametersExpect:
  Enabled: false
Rails/UnknownEnv:
  Environments:
    - production
    - development
    - test
    - staging
Rails/OutputSafety:
  Exclude:
    - 'app/helpers/application_helper.rb'
Rails/DynamicFindBy:
  Whitelist:
    - find_by_alternate_identifier
Layout/IndentationConsistency:
  EnforcedStyle: indented_internal_methods
Layout/HashAlignment:
  EnforcedHashRocketStyle: table
  EnforcedColonStyle: table
Style/MissingRespondToMissing:
  Enabled: false
Style/HashEachMethods:
  Enabled: true
Style/HashTransformKeys:
  Enabled: true
Style/HashTransformValues:
  Enabled: true
Naming/VariableNumber:
  Enabled: false
Lint/EmptyBlock:
  Enabled: false
Lint/ConstantDefinitionInBlock:
  Enabled: false
