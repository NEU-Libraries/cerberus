name: Deploy

on:
  push:
    branches: [ "main" ]

jobs:

  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Make env file
      run: |
        cp .env.example .env
    - name: Dotenv Action
      id: dotenv
      uses: falti/dotenv-action@v1.1.4
    - name: Install HTTPie
      run: sudo apt-get install httpie
    - name: Show versions
      run: |
        echo "cerberus_version=$(cat .version)"
        echo "atlas_version=${{ steps.dotenv.outputs.atlas }}"
    - name: Deploy
      run: http --check-status --ignore-stdin PUT cerberusv2.library.northeastern.edu/deploy token=${{ secrets.CERBERUS_DEPLOY_TOKEN }} cerberus_version=$(cat .version) atlas_version=${{ steps.dotenv.outputs.atlas }}
