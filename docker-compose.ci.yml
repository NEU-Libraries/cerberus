# Use postgres/example user/password credentials
services:
  web:
    environment:
      # Decrypts Cerberus credentials in CI so atlas_rb can sign Atlas
      # assertions; sourced from the RAILS_MASTER_KEY line build_test.yml
      # writes into .env. Kept in the CI override (not the base web service)
      # so local dev keeps using the bind-mounted config/master.key instead.
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
    volumes:
      - ./.git:/home/cerberus/web/.git
