production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  trim_idle_sessions:
    class: SessionTrimJob
    queue: background
    schedule: every hour at minute 27
  rollup_impressions:
    class: RollupImpressionsJob
    queue: background
    schedule: every hour at minute 42
  rollup_container_impressions:
    class: RollupContainerImpressionsJob
    queue: background
    schedule: every day at 4:10am
  reclassify_user_agents:
    class: ReclassifyUserAgentsJob
    queue: background
    schedule: every day at 4:00am
