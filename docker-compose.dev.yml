# Use postgres/example user/password credentials
services:
  atlas:
    volumes:
    - storage:/home/atlas/storage
  iiif:
    volumes:
      - iiif:/imageroot
  web:
    build: .
    ports:
      - 12345:12345
    volumes:
      - ./:/home/cerberus/web
      - iiif:/home/cerberus/images
      - storage:/home/cerberus/storage
